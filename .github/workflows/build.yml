name: OMEGA CI/CD PIPELINE V3 (ENHANCED)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      
    - name: ☕ Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: ⚡ Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      
    # 🛡️ ÁP DỤNG LỆNH ::group:: TỪ TÀI LIỆU
    # Gom toàn bộ log dài dòng của Gradle vào một nhóm có tên "🏗️ Gradle Assembly"
    - name: 🏗️ Build Debug APK
      run: |
        echo "::group::🏗️ Starting Gradle Assembly (Click to expand logs)..."
        gradle assembleDebug --no-daemon
        echo "::endgroup::"
        echo "::notice title=Build Success::APK đã được đúc kết thành công!"
        
    - name: 📦 Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: chimera-omega-apk-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5
