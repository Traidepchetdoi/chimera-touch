name: OMEGA CI/CD PIPELINE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Cho phép bấm nút chạy thủ công

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Kéo mã nguồn từ GitHub về Runner
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    # 2. Cài đặt môi trường Java 17 (Bắt buộc cho Gradle 8.x)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle # Bật cache để tăng tốc độ build lần sau
        
    # 3. Cấp quyền thực thi cho file gradlew
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew
      
    # 4. BIÊN DỊCH APK (BỎ QUA UNIT TESTS)
    # Dùng assembleDebug thay vì build để tránh bị chặn bởi lỗi test vụn vặt
    - name: Build Debug APK
      run: ./gradlew assembleDebug
      
    # 5. UPLOAD APK LÊN ARTIFACT V4 (CHỐNG DEPRECATION)
    - name: Upload APK to Artifact v4
      uses: actions/upload-artifact@v4
      with:
        # Thêm run_number để tránh lỗi trùng tên artifact của v4
        name: chimera-omega-apk-${{ github.run_number }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 5 # Tự động xóa file sau 5 ngày để tiết kiệm dung lượng GitHub
